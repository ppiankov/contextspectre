version: "2"
run:
  timeout: 5m
linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
  settings:
    errcheck:
      check-type-assertions: true
      exclude-functions:
        - (strings.Builder).WriteString
        - (strings.Builder).WriteRune
        - (strings.Builder).WriteByte
        - (*strings.Builder).WriteString
        - (*strings.Builder).WriteRune
        - (*strings.Builder).WriteByte
        - fmt.Fprintf
        - fmt.Fprintln
